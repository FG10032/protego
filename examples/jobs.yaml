jobs:
  - name: clickstream-daily-rollup
    env: prod
    type: batch
    engine: spark
    cluster:
      instance_type: m6i.4xlarge
      workers: 20
      architecture: x86_64
    spark:
      executor_cores: 4
      executor_memory_gb: 16
      dynamic_allocation: false
      max_executors: 80
    data:
      input_gb_per_day: 900
      schedule: daily

  - name: ads-events-stream
    env: prod
    type: streaming
    engine: spark
    cluster:
      instance_type: m6i.2xlarge
      workers: 8
      architecture: x86_64
    spark:
      executor_cores: 2
      executor_memory_gb: 8
      dynamic_allocation: true
      max_executors: 30
    data:
      input_events_per_second: 35000
      schedule: continuous
